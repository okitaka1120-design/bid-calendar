<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>入札スケジュール管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E2E6EA;
    --text-primary: #1A1D23;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --adachi: #2563EB;
    --adachi-light: #DBEAFE;
    --tokyo: #059669;
    --tokyo-light: #D1FAE5;
    --jkk: #D97706;
    --jkk-light: #FEF3C7;
    --radius: 8px;
    --header-h: 52px;
    --tab-h: 52px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
  }
  header h1 { font-size: 14px; font-weight: 700; }
  header .subtitle { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ===== タブバー（下固定） ===== */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    padding: 6px 0;
    transition: color 0.15s;
  }
  .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
  .tab-btn.active { color: var(--adachi); }
  .tab-btn.active .tab-icon { transform: scale(1.1); }

  /* ===== コンテンツエリア ===== */
  .page {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    bottom: var(--tab-h);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
    padding: 16px;
  }
  .page.active { display: block; }

  /* ===== 入力フォーム ===== */
  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 16px;
  }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.05em; }

  .form-group input, .form-group select {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: var(--adachi); background: white;
  }

  /* 日程結果 */
  .date-result-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .date-result-row { display: flex; flex-direction: column; gap: 4px; }
  .date-result-label {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    display: flex; align-items: center; gap: 5px;
  }
  .date-result-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .date-auto-display {
    font-size: 15px; font-weight: 700; color: var(--text-primary); padding: 2px 0;
  }
  .date-auto-display.empty { color: var(--text-muted); font-weight: 400; font-size: 14px; }

  .date-override-wrap input[type=date] {
    font-size: 15px; font-weight: 600;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: white; width: 100%;
    -webkit-appearance: none;
  }

  .btn-override-toggle {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; color: var(--text-muted); cursor: pointer;
    padding: 2px 8px; font-family: inherit; margin-left: auto;
  }
  .btn-override-toggle.active { background: #FEF3C7; color: #92400E; border-color: #FDE68A; }

  .manual-badge {
    font-size: 9px; background: var(--tokyo-light); color: var(--tokyo);
    border: 1px solid #6EE7B7; border-radius: 3px; padding: 0 5px; margin-left: 4px; font-weight: 700;
  }

  .note-box {
    background: #FFFBEB; border: 1px solid #FDE68A; border-radius: var(--radius);
    padding: 10px 12px; font-size: 11px; color: #92400E; line-height: 1.7;
  }

  .btn-add {
    background: var(--adachi); color: white; border: none;
    border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; width: 100%;
    -webkit-appearance: none;
  }
  .btn-add:disabled { opacity: 0.4; }

  .separator { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* ===== 案件リスト ===== */
  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .case-list { display: flex; flex-direction: column; gap: 8px; }
  .case-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .case-item-info { display: flex; flex-direction: column; gap: 3px; }
  .case-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 7px; border-radius: 4px; margin-bottom: 2px;
  }
  .tag-adachi { background: var(--adachi-light); color: var(--adachi); }
  .tag-tokyo  { background: var(--tokyo-light);  color: var(--tokyo); }
  .tag-jkk    { background: var(--jkk-light);    color: var(--jkk); }
  .case-name { font-size: 13px; font-weight: 700; }
  .case-dates { font-size: 11px; color: var(--text-muted); }
  .btn-del {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-size: 13px; padding: 4px 10px; cursor: pointer;
    min-width: 36px; text-align: center;
  }

  /* ===== カレンダー ===== */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-nav h2 { font-size: 17px; font-weight: 700; }
  .btn-nav {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 16px;
    cursor: pointer; font-family: inherit; font-size: 13px; color: var(--text-secondary);
  }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-header-cell {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--text-muted); padding: 5px 0;
  }
  .cal-header-cell.sun { color: #EF4444; }
  .cal-header-cell.sat { color: #3B82F6; }

  .cal-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; min-height: 64px; padding: 4px;
    position: relative;
  }
  .cal-cell.other-month { opacity: 0.35; }
  .cal-cell.today { border-color: var(--adachi); border-width: 2px; }
  .cal-cell.holiday { background: #FFF5F5; }
  .cal-cell.sunday { background: #FFF0F0; }
  .cal-cell.saturday { background: #EFF6FF; }

  .day-num {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    display: block; margin-bottom: 2px;
  }
  .day-num.sun, .day-num.holiday-num { color: #EF4444; }
  .day-num.sat { color: #3B82F6; }

  .event-pill {
    display: block; font-size: 8px; font-weight: 700;
    padding: 1px 4px; border-radius: 3px; margin-bottom: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pill-申込-adachi { background: var(--adachi-light); color: var(--adachi); }
  .pill-指名-adachi { background: #EDE9FE; color: #6D28D9; }
  .pill-入札-adachi { background: #FCE7F3; color: #BE185D; }
  .pill-申込-tokyo  { background: var(--tokyo-light);  color: var(--tokyo); }
  .pill-指名-tokyo  { background: #D1FAE5; color: #065F46; }
  .pill-入札-tokyo  { background: #FCE7F3; color: #BE185D; }
  .pill-申込-jkk    { background: var(--jkk-light);    color: var(--jkk); }
  .pill-指名-jkk    { background: #FEF3C7; color: #92400E; }
  .pill-入札-jkk    { background: #FCE7F3; color: #BE185D; }

  /* 凡例 */
  .legend-row {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 10px; color: var(--text-secondary);
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* PC用レイアウト（768px以上） */
  @media (min-width: 768px) {
    html, body { overflow: auto; height: auto; }

    header { position: sticky; }

    .tab-bar { display: none; }

    .page {
      position: static;
      display: block !important;
      overflow: visible;
      padding: 0;
      bottom: auto; top: auto;
    }

    .pc-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - var(--header-h));
    }

    .pc-left {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--surface);
    }

    .pc-right {
      overflow-y: auto;
      padding: 20px;
    }

    .page-form, .page-calendar, .page-list { display: contents; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📋 入札スケジュール管理</h1>
    <div class="subtitle">申込締切日を入力すると日程を自動算出</div>
  </div>
</header>

<!-- スマホ：タブ切り替え -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('form')" id="tab-form">
    <span class="tab-icon">✏️</span>入力
  </button>
  <button class="tab-btn" onclick="switchTab('calendar')" id="tab-calendar">
    <span class="tab-icon">📅</span>カレンダー
  </button>
  <button class="tab-btn" onclick="switchTab('list')" id="tab-list">
    <span class="tab-icon">📋</span>案件一覧
  </button>
</div>

<!-- PC：2カラムレイアウト -->
<div class="pc-layout">
  <div class="pc-left">

    <!-- 入力フォーム -->
    <div class="page page-form active" id="page-form">
      <div class="form-card">
        <div class="section-title">新規案件登録</div>

        <div class="form-group">
          <label>案件名</label>
          <input type="text" id="caseName" placeholder="例：足立区○○工事">
        </div>

        <div class="form-group">
          <label>発注者</label>
          <select id="issuer" onchange="onIssuerChange()">
            <option value="adachi">足立区</option>
            <option value="tokyo">東京都</option>
            <option value="jkk">JKK</option>
          </select>
        </div>

        <div class="form-group">
          <label>申込締切日</label>
          <input type="date" id="applyDate" onchange="updatePreview()">
        </div>

        <div class="date-result-box">
          <div class="date-result-row">
            <div class="date-result-label">
              <span class="date-result-dot" style="background:#6366F1"></span>申込締切日
            </div>
            <div class="date-auto-display empty" id="res-apply">—</div>
          </div>
          <hr class="separator">
          <div class="date-result-row">
            <div class="date-result-label">
              <span class="date-result-dot" style="background:#8B5CF6"></span>
              指名決定日
              <span id="meimei-manual-badge" class="manual-badge" style="display:none">手入力</span>
              <button class="btn-override-toggle" id="meimei-toggle-btn" onclick="toggleOverride('meimei')" style="display:none">上書き</button>
            </div>
            <div class="date-auto-display empty" id="meimei-auto">—</div>
            <div class="date-override-wrap" id="meimei-input-wrap" style="display:none">
              <input type="date" id="meimei-input" onchange="onManualChange()">
            </div>
          </div>
          <div class="date-result-row">
            <div class="date-result-label">
              <span class="date-result-dot" style="background:#EC4899"></span>
              入札締切日
              <span id="nyusatsu-manual-badge" class="manual-badge" style="display:none">手入力</span>
              <button class="btn-override-toggle" id="nyusatsu-toggle-btn" onclick="toggleOverride('nyusatsu')" style="display:none">上書き</button>
            </div>
            <div class="date-auto-display empty" id="nyusatsu-auto">—</div>
            <div class="date-override-wrap" id="nyusatsu-input-wrap" style="display:none">
              <input type="date" id="nyusatsu-input" onchange="onManualChange()">
            </div>
          </div>
        </div>

        <div class="note-box" id="noteBox">
          ※ 指名決定日・入札締切日が祝日の場合は翌日に順延<br>
          ※ 申込締切日〜入札締切日までに祝日がある場合は休日分が順延
        </div>

        <button class="btn-add" id="btnAdd" onclick="addCase()" disabled>カレンダーに追加</button>
      </div>
    </div>

    <!-- 案件一覧 -->
    <div class="page page-list" id="page-list">
      <div class="section-title">登録済み案件</div>
      <div class="case-list" id="caseList">
        <div style="font-size:12px;color:var(--text-muted);padding:8px 0">まだ案件がありません</div>
      </div>
    </div>

  </div><!-- /pc-left -->

  <div class="pc-right">
    <!-- カレンダー -->
    <div class="page page-calendar" id="page-calendar">
      <div class="legend-row">
        <div class="legend-item"><span class="legend-dot" style="background:#2563EB"></span>足立区</div>
        <div class="legend-item"><span class="legend-dot" style="background:#059669"></span>東京都</div>
        <div class="legend-item"><span class="legend-dot" style="background:#D97706"></span>JKK</div>
        <span style="color:var(--border)">｜</span>
        <div class="legend-item">🏷申込</div>
        <div class="legend-item">🔖指名</div>
        <div class="legend-item">📌入札</div>
      </div>
      <div class="cal-nav">
        <button class="btn-nav" onclick="changeMonth(-1)">◀ 前月</button>
        <h2 id="calTitle"></h2>
        <button class="btn-nav" onclick="changeMonth(1)">翌月 ▶</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div><!-- /pc-right -->

</div><!-- /pc-layout -->

<script>
// ===== 祝日 =====
const HOLIDAYS = new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05',
  '2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05',
  '2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
]);

const RULES = {
  adachi: { meimei: 6,  nyusatsu: 13 },
  jkk:    { meimei: 7,  nyusatsu: 10 },
};
const ISSUER_LABEL = { adachi:'足立区', tokyo:'東京都', jkk:'JKK' };

let meimeiOverride = false;
let nyusatsuOverride = false;
let cases = [];
let currentYear, currentMonth;

// ===== タブ切り替え =====
function switchTab(tab) {
  ['form','calendar','list'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
}

// ===== ユーティリティ =====
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isHolOrWknd(d) {
  return d.getDay()===0 || d.getDay()===6 || HOLIDAYS.has(toDateStr(d));
}
function isHolOnly(d) {
  return d.getDay()!==0 && d.getDay()!==6 && HOLIDAYS.has(toDateStr(d));
}
function adjustToBusinessDay(d) {
  const r = new Date(d);
  while (isHolOrWknd(r)) r.setDate(r.getDate()+1);
  return r;
}
function addCalDays(dateStr, days) {
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d;
}
function countHolInPeriod(startD, endD) {
  let count=0;
  const d=new Date(startD);
  d.setDate(d.getDate()+1);
  while(d<=endD){if(isHolOnly(d))count++;d.setDate(d.getDate()+1);}
  return count;
}
function formatDate(d) {
  if(!d) return '—';
  const m=d.getMonth()+1, day=d.getDate();
  const dow=['日','月','火','水','木','金','土'][d.getDay()];
  return `${m}月${day}日（${dow}）`;
}

// ===== 自動計算 =====
function calcAutoDate(applyStr, issuer) {
  const rule = RULES[issuer];
  if(!rule||!applyStr) return null;
  let meimei = addCalDays(applyStr, rule.meimei);
  meimei = adjustToBusinessDay(meimei);
  const base = addCalDays(toDateStr(meimei), rule.nyusatsu);
  let nyusatsu = adjustToBusinessDay(new Date(base));
  const holCount = countHolInPeriod(meimei, base);
  nyusatsu.setDate(nyusatsu.getDate()+holCount);
  nyusatsu = adjustToBusinessDay(nyusatsu);
  return { meimei, nyusatsu };
}

// ===== 発注者変更 =====
function onIssuerChange() {
  const issuer = document.getElementById('issuer').value;
  meimeiOverride = false;
  nyusatsuOverride = false;
  document.getElementById('meimei-input').value = '';
  document.getElementById('nyusatsu-input').value = '';

  if(issuer==='tokyo'){
    showManualMode('meimei'); showManualMode('nyusatsu');
    document.getElementById('noteBox').innerHTML='※ 東京都は指名決定日・入札締切日を手入力してください';
  } else {
    showAutoMode('meimei'); showAutoMode('nyusatsu');
    document.getElementById('noteBox').innerHTML=
      '※ 指名決定日・入札締切日が祝日の場合は翌日に順延<br>※ 申込締切日〜入札締切日までに祝日がある場合は休日分が順延<br>※ 誤りがある場合は「上書き」ボタンで手入力できます';
  }
  updatePreview();
}
function showAutoMode(f){
  document.getElementById(`${f}-auto`).style.display='block';
  document.getElementById(`${f}-input-wrap`).style.display='none';
  document.getElementById(`${f}-manual-badge`).style.display='none';
  document.getElementById(`${f}-toggle-btn`).style.display='inline-block';
  const btn=document.getElementById(`${f}-toggle-btn`);
  btn.textContent='上書き'; btn.classList.remove('active');
}
function showManualMode(f){
  document.getElementById(`${f}-auto`).style.display='none';
  document.getElementById(`${f}-input-wrap`).style.display='block';
  document.getElementById(`${f}-manual-badge`).style.display='inline-block';
  document.getElementById(`${f}-toggle-btn`).style.display='none';
}

// ===== 上書きトグル =====
function toggleOverride(field) {
  const newState = field==='meimei' ? !meimeiOverride : !nyusatsuOverride;
  if(field==='meimei') meimeiOverride=newState;
  else nyusatsuOverride=newState;
  const btn=document.getElementById(`${field}-toggle-btn`);
  const autoEl=document.getElementById(`${field}-auto`);
  const wrap=document.getElementById(`${field}-input-wrap`);
  const badge=document.getElementById(`${field}-manual-badge`);
  if(newState){
    btn.textContent='自動に戻す'; btn.classList.add('active');
    autoEl.style.display='none'; wrap.style.display='block'; badge.style.display='inline-block';
    document.getElementById(`${field}-input`).value=autoEl.dataset.value||'';
  } else {
    btn.textContent='上書き'; btn.classList.remove('active');
    autoEl.style.display='block'; wrap.style.display='none'; badge.style.display='none';
    document.getElementById(`${field}-input`).value='';
  }
  updateAddButton();
}

// ===== プレビュー =====
function updatePreview(){
  const applyStr=document.getElementById('applyDate').value;
  const issuer=document.getElementById('issuer').value;
  const applyEl=document.getElementById('res-apply');
  if(!applyStr){
    applyEl.textContent='—'; applyEl.className='date-auto-display empty';
    if(issuer!=='tokyo'){setAutoDisplay('meimei',null);setAutoDisplay('nyusatsu',null);}
    updateAddButton(); return;
  }
  applyEl.textContent=formatDate(new Date(applyStr+'T00:00:00'));
  applyEl.className='date-auto-display';
  if(issuer!=='tokyo'){
    const dates=calcAutoDate(applyStr,issuer);
    if(dates){setAutoDisplay('meimei',dates.meimei);setAutoDisplay('nyusatsu',dates.nyusatsu);}
  }
  updateAddButton();
}
function setAutoDisplay(field,dateObj){
  const el=document.getElementById(`${field}-auto`);
  if(dateObj){
    el.textContent=formatDate(dateObj); el.className='date-auto-display';
    el.dataset.value=toDateStr(dateObj);
  } else {
    el.textContent='—'; el.className='date-auto-display empty'; el.dataset.value='';
  }
}
function onManualChange(){ updateAddButton(); }

// ===== ボタン活性 =====
function updateAddButton(){
  const name=document.getElementById('caseName').value.trim();
  const applyStr=document.getElementById('applyDate').value;
  const issuer=document.getElementById('issuer').value;
  let mOk=false, nOk=false;
  if(issuer==='tokyo'){
    mOk=!!document.getElementById('meimei-input').value;
    nOk=!!document.getElementById('nyusatsu-input').value;
  } else {
    mOk=meimeiOverride?!!document.getElementById('meimei-input').value:!!document.getElementById('meimei-auto').dataset.value;
    nOk=nyusatsuOverride?!!document.getElementById('nyusatsu-input').value:!!document.getElementById('nyusatsu-auto').dataset.value;
  }
  document.getElementById('btnAdd').disabled=!(name&&applyStr&&mOk&&nOk);
}
document.getElementById('caseName').addEventListener('input', updateAddButton);

// ===== 案件追加 =====
function addCase(){
  const applyStr=document.getElementById('applyDate').value;
  const issuer=document.getElementById('issuer').value;
  const name=document.getElementById('caseName').value.trim();
  if(!name||!applyStr) return;
  let meimeiStr,nyusatsuStr;
  if(issuer==='tokyo'){
    meimeiStr=document.getElementById('meimei-input').value;
    nyusatsuStr=document.getElementById('nyusatsu-input').value;
  } else {
    meimeiStr=meimeiOverride?document.getElementById('meimei-input').value:document.getElementById('meimei-auto').dataset.value;
    nyusatsuStr=nyusatsuOverride?document.getElementById('nyusatsu-input').value:document.getElementById('nyusatsu-auto').dataset.value;
  }
  if(!meimeiStr||!nyusatsuStr) return;
  cases.push({id:Date.now(),name,issuer,applyStr,meimeiStr,nyusatsuStr});
  saveCases();
  document.getElementById('caseName').value='';
  document.getElementById('applyDate').value='';
  document.getElementById('meimei-input').value='';
  document.getElementById('nyusatsu-input').value='';
  meimeiOverride=false; nyusatsuOverride=false;
  onIssuerChange(); updatePreview();
  renderCaseList(); renderCalendar();
  // スマホではカレンダーへ遷移
  if(window.innerWidth<768) switchTab('calendar');
}

// ===== 案件削除 =====
function deleteCase(id){
  cases=cases.filter(c=>c.id!==id);
  saveCases(); renderCaseList(); renderCalendar();
}

// ===== リスト描画 =====
function renderCaseList(){
  const el=document.getElementById('caseList');
  if(cases.length===0){
    el.innerHTML='<div style="font-size:12px;color:var(--text-muted);padding:12px 0">まだ案件がありません</div>';
    return;
  }
  el.innerHTML=cases.map(c=>`
    <div class="case-item">
      <div class="case-item-info">
        <span class="case-tag tag-${c.issuer}">${ISSUER_LABEL[c.issuer]}</span>
        <span class="case-name">${c.name}</span>
        <span class="case-dates">申込 ${c.applyStr.replace(/-/g,'/')} / 入札 ${c.nyusatsuStr.replace(/-/g,'/')}</span>
      </div>
      <button class="btn-del" onclick="deleteCase(${c.id})">✕</button>
    </div>
  `).join('');
}

// ===== カレンダー =====
const today=new Date();
currentYear=today.getFullYear();
currentMonth=today.getMonth();

function changeMonth(delta){
  currentMonth+=delta;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('calTitle').textContent=`${currentYear}年${currentMonth+1}月`;
  const eventMap={};
  cases.forEach(c=>{
    [[c.applyStr,'申込'],[c.meimeiStr,'指名'],[c.nyusatsuStr,'入札']].forEach(([ds,type])=>{
      if(!eventMap[ds]) eventMap[ds]=[];
      eventMap[ds].push({name:c.name,issuer:c.issuer,type});
    });
  });
  const DOW=['日','月','火','水','木','金','土'];
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  DOW.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='cal-header-cell'+(i===0?' sun':i===6?' sat':'');
    h.textContent=d; grid.appendChild(h);
  });
  const firstDay=new Date(currentYear,currentMonth,1);
  const lastDay=new Date(currentYear,currentMonth+1,0);
  const startDow=firstDay.getDay();
  const prevLast=new Date(currentYear,currentMonth,0).getDate();
  for(let i=0;i<startDow;i++)
    grid.appendChild(makeCell(currentYear,currentMonth-1,prevLast-startDow+1+i,true,eventMap));
  for(let d=1;d<=lastDay.getDate();d++)
    grid.appendChild(makeCell(currentYear,currentMonth,d,false,eventMap));
  const rem=(7-(startDow+lastDay.getDate())%7)%7;
  for(let d=1;d<=rem;d++)
    grid.appendChild(makeCell(currentYear,currentMonth+1,d,true,eventMap));
}

function makeCell(year,month,day,otherMonth,eventMap){
  const d=new Date(year,month,day);
  const dateStr=toDateStr(d);
  const dow=d.getDay();
  const isToday=dateStr===toDateStr(today);
  const isHol=HOLIDAYS.has(dateStr);
  const cell=document.createElement('div');
  cell.className='cal-cell'
    +(otherMonth?' other-month':'')
    +(isToday?' today':'')
    +(isHol?' holiday':'')
    +(dow===0&&!isHol?' sunday':'')
    +(dow===6?' saturday':'');
  const nc=dow===0||isHol?'sun':dow===6?'sat':'';
  cell.innerHTML=`<span class="day-num ${nc}">${day}</span>`;
  (eventMap[dateStr]||[]).forEach(ev=>{
    const pill=document.createElement('span');
    pill.className=`event-pill pill-${ev.type}-${ev.issuer}`;
    const icon=ev.type==='申込'?'🏷':ev.type==='指名'?'🔖':'📌';
    pill.textContent=`${icon} ${ev.name}`;
    pill.title=`${ISSUER_LABEL[ev.issuer]} / ${ev.name} / ${ev.type}`;
    cell.appendChild(pill);
  });
  return cell;
}

// ===== 保存・読み込み =====
const STORAGE_KEY='bid_calendar_cases';
function saveCases(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(cases));
    showSaveToast();
  }catch(e){}
}
function loadCases(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw) cases=JSON.parse(raw);
  }catch(e){cases=[];}
}
function showSaveToast(){
  let t=document.getElementById('save-toast');
  if(!t){
    t=document.createElement('div');
    t.id='save-toast';
    t.style.cssText='position:fixed;bottom:68px;right:16px;z-index:9999;background:#1A1D23;color:white;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity 0.2s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent='✓ 自動保存しました';
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},1800);
}

// ===== 初期化 =====
loadCases();
onIssuerChange();
renderCaseList();
renderCalendar();
</script>
